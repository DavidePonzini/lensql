services:
  nginx_prod:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME}_nginx_prod
    restart: unless-stopped
    networks:
      - default
    ports:
      - "${PORT:-3001}:80"
    profiles:
      - prod
    depends_on:
      - server

  nginx_dev:
    build: ./nginx
    container_name: ${COMPOSE_PROJECT_NAME}_nginx_dev
    restart: unless-stopped
    networks:
      - default
    ports:
      - "${PORT:-3001}:80"
    profiles:
      - dev
    depends_on:
      - webui
      - server
  nginx_maintenance:
    image: davideponzini/maintenance
    container_name: ${COMPOSE_PROJECT_NAME}_nginx_maintenance
    restart: unless-stopped
    networks:
      - default
    ports:
      - "${PORT:-3001}:80"
    profiles:
      - maintenance

  webui:
    build: ./webui
    container_name: ${COMPOSE_PROJECT_NAME}_webui
    restart: unless-stopped
    networks:
      - default
    ports:
      - "3000:3000"
    profiles:
      - dev

  server:
    build: ./server
    container_name: ${COMPOSE_PROJECT_NAME}_server
    restart: unless-stopped
    depends_on:
      - db_admin
    environment:
      - DB_HOST=db_admin
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - DB_NAME=postgres
      - MAX_CONNECTION_HOURS=4
      - CLEANUP_INTERVAL_SECONDS=3600
      - MAX_CONTENT_LENGTH=20971520
      - DB_USERS_NETWORK=${COMPOSE_PROJECT_NAME}_db_users_network
      - PROJECT_NAME=${COMPOSE_PROJECT_NAME}
    env_file:
      - server/.env
    networks:
      - default
      - db_users
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  db_admin:
    build: ./db_admin
    container_name: ${COMPOSE_PROJECT_NAME}_db_admin
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: password
    networks:
      - default
    volumes:
      - db_admin_pgdata:/var/lib/postgresql

  preload_db_users_postgres:
    image: postgres
    restart: no
    environment:
      POSTGRES_PASSWORD: password
    command: ['true']

  preload_db_users_mysql:
    image: mysql
    restart: no
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: true
    command: ['true']
      

volumes:
  db_admin_pgdata:
    name: ${COMPOSE_PROJECT_NAME}_db_admin_pgdata

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME}_network
  db_users:
    name: ${COMPOSE_PROJECT_NAME}_db_users_network